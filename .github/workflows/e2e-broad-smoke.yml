name: Playwright broad smoke

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: playwright-broad-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  broad-smoke:
    name: Broad smoke E2E (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - project: chromium
            script: e2e:smoke
          - project: mobile-chrome
            script: e2e:smoke:mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Pin npm
        run: npm install -g npm@10.8.2

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npm run e2e:install -- --with-deps chromium

      - name: Run broad smoke suite
        run: npm run ${{ matrix.script }}

      - name: Write broad smoke summary
        if: always()
        run: |
          {
            echo "## Playwright broad smoke"
            echo ""
            echo "- Command: \`npm run ${{ matrix.script }}\`"
            echo "- Project: \`${{ matrix.project }}\`"
            echo "- Layer: mocked app/admin smoke surfaces"
            echo "- Artifacts: HTML report and traces/videos/screenshots are uploaded on failure"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-${{ matrix.project }}
          path: e2e/test-results
          if-no-files-found: ignore
          retention-days: 14
