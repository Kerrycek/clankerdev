name: Playwright smoke

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: playwright-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Pin npm
        run: |
          npm install -g npm@9.9.4
          npm --version

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Install Playwright browsers
        run: npm run e2e:install -- --with-deps chromium

      - name: Run PR smoke E2E
        run: npm run e2e:pr

      - name: Write PR smoke summary
        if: always()
        run: |
          {
            echo "## Playwright PR smoke"
            echo ""
            echo "- Command: \`npm run e2e:pr\`"
            echo "- Layer: fast mocked critical path on desktop and mobile"
            echo "- Artifacts: HTML report and traces/videos/screenshots are uploaded on failure"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: e2e/test-results
          if-no-files-found: ignore
          retention-days: 7
