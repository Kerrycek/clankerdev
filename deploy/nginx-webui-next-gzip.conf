# WebUI Next serves large hashed JavaScript chunks. Include this file from
# /etc/nginx/conf.d when nginx.conf already has `gzip on;`.
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/xml+rss
    image/svg+xml;
