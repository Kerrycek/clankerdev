<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName dev.crucio.cz

    DocumentRoot /var/www/dev.crucio.cz/current

    ProxyPreserveHost On
    ProxyPass /v7.0 http://admin.crucio.cz/v7.0
    ProxyPassReverse /v7.0 http://admin.crucio.cz/v7.0
    ProxyPass /_auth http://admin.crucio.cz/_auth
    ProxyPassReverse /_auth http://admin.crucio.cz/_auth
    RequestHeader set X-Forwarded-Proto "https"

    <Location "/v7.0">
        Header always unset WWW-Authenticate
        Header unset WWW-Authenticate
    </Location>

    <Directory /var/www/dev.crucio.cz/current>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^ /index.html [L]
        </IfModule>
    </Directory>

    <FilesMatch "^\.git|^\.env|^\.ht">
        Require all denied
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/dev.crucio.cz_error.log
    CustomLog ${APACHE_LOG_DIR}/dev.crucio.cz_access.log combined

    SSLCertificateFile /etc/letsencrypt/live/dev.crucio.cz/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/dev.crucio.cz/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
