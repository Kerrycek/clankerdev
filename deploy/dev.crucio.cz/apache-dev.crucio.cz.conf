<VirtualHost *:80>
    ServerName dev.crucio.cz

    DocumentRoot /var/www/dev.crucio.cz/current

    RewriteEngine On
    RewriteCond %{SERVER_NAME} =dev.crucio.cz
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]

    ErrorLog ${APACHE_LOG_DIR}/dev.crucio.cz_error.log
    CustomLog ${APACHE_LOG_DIR}/dev.crucio.cz_access.log combined
</VirtualHost>
